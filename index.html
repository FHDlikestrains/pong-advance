<!DOCTYPE html><html><head><meta charset="UTF-8"><title>PONG 2.0: FULL SUITE</title>
<style>
    body{margin:0;background:#050505;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;color:#fff;font-family:'Courier New', Courier, monospace}
    canvas{background:#000;border:4px solid #333;display:block;box-shadow: 0 0 50px rgba(0,255,255,0.1);}
</style></head>
<body><canvas id="g" width="1000" height="500"></canvas>
<script>
const c=document.getElementById("g"),x=c.getContext("2d");
let s="menu",m="2v2",w=null,sc1=0,sc2=0,shake=0,au=null;
const P=10,H=60,MAX=100;
let k={},parts=[];
let b={x:500,y:250,r:7,sx:5,sy:3,fx:0};

let pds = {}; // Initialized in rs() based on mode

function playSound(freq, dur, type="sine", ramp=true) {
    if(!au) au = new (window.AudioContext || window.webkitAudioContext)();
    if(au.state === 'suspended') au.resume();
    let o=au.createOscillator(), g=au.createGain();
    o.type=type; o.frequency.setValueAtTime(freq, au.currentTime);
    if(ramp) o.frequency.exponentialRampToValueAtTime(10, au.currentTime + dur);
    g.gain.setValueAtTime(0.1, au.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, au.currentTime + dur);
    o.connect(g); g.connect(au.destination);
    o.start(); o.stop(au.currentTime + dur);
}

addEventListener("keydown",e=>{ 
    k[e.key.toLowerCase()]=1; 
    if(s=="menu"){
        if(e.key=="1"){ m="1v1"; s="play"; rs(); }
        if(e.key=="2"){ m="2v2"; s="play"; rs(); }
    }
    if(e.key=="Escape")s="menu"; 
    if(e.key=="r"&&w)rs(); 
});
addEventListener("keyup",e=>k[e.key.toLowerCase()]=0);

function rs(){ 
    sc1=sc2=0; w=null; 
    if(m=="1v1") {
        pds = {
            p1: {x:20,  y:220, h:0, f:50, st:0, side:1, controls:['w','s','a','d']},
            p2: {x:970, y:220, h:0, f:50, st:0, side:0, controls:['arrowup','arrowdown','arrowleft','arrowright']}
        };
    } else {
        pds = {
            p1: {x:120, y:220, h:0, f:50, st:0, side:1, controls:['w','s','a','d']},
            p2: {x:20,  y:220, h:0, f:50, st:0, side:1, controls:['t','g','f','h']},
            p3: {x:870, y:220, h:0, f:50, st:0, side:0, controls:['i','k','j','l']},
            p4: {x:970, y:220, h:0, f:50, st:0, side:0, controls:['arrowup','arrowdown','arrowleft','arrowright']}
        };
    }
    rb(m=="1v1"?5:6); 
    parts=[];
}

function rb(d){ b.x=500; b.y=250; b.sx=d; b.sy=(Math.random()>.5?3:-3); }
function cl(v,a,b){ return Math.max(a,Math.min(b,v)); }

function spawnParts(count, color, speed) {
    for(let i=0; i<count; i++) parts.push({x:b.x, y:b.y, vx:(Math.random()-0.5)*speed, vy:(Math.random()-0.5)*speed, life:1.0, c:color});
}

function updP(p) {
    if(p.st > 0) { p.st--; p.h -= 0.5; } 
    else {
        let mv = 0; if(k[p.controls[0]]) mv=-1; if(k[p.controls[1]]) mv=1;
        p.y += mv * (p.h > 75 ? 3 : 7);
        p.h = mv!==0 ? p.h+0.6 : p.h-1.0;
        p.f = p.h<35 ? p.f+0.3 : (p.h>80?p.f-0.15:p.f);
        if(p.h >= MAX) { p.st=120; playSound(80, 0.5, "sawtooth"); }
    }
    p.y = cl(p.y, 0, 440); p.h = cl(p.h, 0, MAX); p.f = cl(p.f, 0, MAX);
}

function coll(p) {
    let bo=1, cost=10, isSp=false;
    if(p.st<=0){
        let boost = k[p.controls[3]]; 
        let slow = k[p.controls[2]];
        if((boost||slow) && p.f>=50) { bo=boost?2.1:0.3; cost=50; isSp=true; }
    }
    if(isSp){ p.h+=25; shake=22; spawnParts(30,"#0ff",16); playSound(150,0.4,"triangle"); }
    else { shake=7; spawnParts(8,"#fff",6); playSound(300,0.1); }
    
    b.sx = (p.side?1:-1) * Math.abs(b.sx*1.06*bo*(0.7+p.f/100));
    b.sy = -((p.y+H/2)-b.y)/(H/2)*8;
    b.x = p.side ? p.x+P+b.r+2 : p.x-b.r-2;
    p.f = cl(p.f-cost, 0, MAX);
    b.fx = bo>1.1?12:(bo<0.9?-12:0);
}

function loop(){
    let sx=(Math.random()-0.5)*shake, sy=(Math.random()-0.5)*shake;
    if(shake>0) shake*=0.82;
    x.setTransform(1,0,0,1,0,0); x.fillStyle="#000"; x.fillRect(0,0,1000,500); x.translate(sx,sy);
    
    if(s=="menu"){
        x.fillStyle="#0ff"; x.textAlign="center"; x.font="50px Courier New"; x.fillText("PONG 2.0: HUB", 500, 150);
        x.fillStyle="#fff"; x.font="20px Courier New";
        x.fillText("[1] CLASSIC 1v1", 500, 240);
        x.fillText("[2] QUAD-STRIKE 2v2", 500, 280);
        x.font="12px Courier New"; x.fillStyle="#444";
        x.fillText("SELECT SYSTEM CONFIGURATION TO START", 500, 450);
    } else if(w){
        x.fillStyle="#0ff"; x.font="50px Courier New"; x.textAlign="center"; x.fillText(w + " DOMINATES", 500, 250);
        x.font="20px Courier New"; x.fillStyle="#fff"; x.fillText("PRESS 'R' TO RE-SYNC", 500, 310);
    } else {
        Object.values(pds).forEach(p => updP(p));

        for(let i=0; i<4; i++){
            b.x += b.sx/4; b.y += b.sy/4;
            Object.values(pds).forEach(p=>{
                if(b.x+b.r>=p.x && b.x-b.r<=p.x+P && b.y>=p.y && b.y<=p.y+H) coll(p);
            });
        }

        if(b.y<b.r || b.y>500-b.r){ b.sy*=-1; b.y=cl(b.y,b.r,500-b.r); playSound(600,0.05); }
        if(b.x<-20){ sc2++; rb(5); playSound(100,0.5); }
        if(b.x>1020){ sc1++; rb(-5); playSound(100,0.5); }
        if(sc1>=10) w="TEAM 1"; if(sc2>=10) w="TEAM 2";

        for(let i=parts.length-1; i>=0; i--){
            let p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.025;
            if(p.life<=0) parts.splice(i,1); else { x.globalAlpha=p.life; x.fillStyle=p.c; x.fillRect(p.x,p.y,3,3); }
        }
        x.globalAlpha=1;
        Object.values(pds).forEach(p=>{
            x.fillStyle="#222"; x.fillRect(p.x, p.y-12, 20, 4);
            x.fillStyle="#0ff"; x.fillRect(p.x, p.y-12, (p.f/MAX)*20, 4);
            x.fillStyle=p.st>0?"#f00":"#fff"; x.fillRect(p.x,p.y,P,H);
        });
        x.save(); if(b.fx>0){x.shadowBlur=25;x.shadowColor="yellow";b.fx--;}
        else if(b.fx<0){x.shadowBlur=25;x.shadowColor="#0ff";x.fillStyle="#0ff";b.fx++;}
        x.beginPath(); x.arc(b.x,b.y,b.r,0,Math.PI*2); x.fill(); x.restore();
        x.fillStyle="#fff"; x.font="30px Courier New"; x.textAlign="center"; x.fillText(sc1+" : "+sc2, 500, 40);
    }
    requestAnimationFrame(loop);
}
loop();
</script></body></html>
